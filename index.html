<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JASM - Folleto y Gestión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f1f5f9; }
        .gradient-blue { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl overflow-hidden rounded-b-[2.5rem]">
        
        <header class="gradient-blue text-white p-10 text-center rounded-b-[3.5rem] shadow-lg">
            <h1 class="text-5xl font-extrabold tracking-tighter text-white">JASM</h1>
            <p class="text-[10px] uppercase tracking-[0.3em] opacity-80 text-white">Confianza que impulsa</p>
        </header>

        <div class="p-7 space-y-7">
            <div class="bg-blue-50 p-6 rounded-3xl border-l-4 border-blue-600 card-shadow text-center">
                <h3 class="font-bold text-blue-900 uppercase text-sm italic">¡IMPULSA TU NEGOCIO HOY! 🚀</h3>
                <p class="text-[11px] text-blue-700 mt-1">Crédito rápido, seguro y diseñado para tu crecimiento.</p>
            </div>

            <div class="space-y-4">
                <h2 class="text-sm font-bold text-slate-800 flex items-center italic">
                    <i class="fas fa-clipboard-check mr-3 text-blue-600 text-lg"></i> REQUISITOS MÍNIMOS
                </h2>
                <ul class="grid grid-cols-1 gap-3 text-[11px] text-slate-600 font-medium">
                    <li class="flex items-center p-4 bg-slate-50 rounded-2xl border border-slate-100 shadow-sm">
                        <i class="fas fa-id-card mr-4 text-blue-500 text-lg"></i> INE Vigente (Original)
                    </li>
                    <li class="flex items-center p-4 bg-slate-50 rounded-2xl border border-slate-100 shadow-sm">
                        <i class="fas fa-home mr-4 text-blue-500 text-lg"></i> Comprobante de Domicilio
                    </li>
                    <li class="flex items-center p-4 bg-slate-50 rounded-2xl border border-slate-100 shadow-sm">
                        <i class="fas fa-store mr-4 text-blue-500 text-lg"></i> Negocio Propio o Establecido
                    </li>
                </ul>
            </div>
        </div>

        <div class="mt-12 bg-[#0f172a] p-9 text-white rounded-t-[3.5rem] border-t-8 border-blue-600 shadow-[0_-15px_30px_rgba(0,0,0,0.2)]">
            <h2 class="text-2xl font-bold mb-8 text-blue-400 flex items-center italic tracking-tight">
                <i class="fas fa-calculator mr-4 text-blue-500"></i> CALCULADORA JASM
            </h2>
            
            <div class="space-y-6">
                <div class="relative">
                    <label class="text-[10px] text-slate-400 font-bold uppercase ml-1 tracking-widest">Monto a Prestar ($)</label>
                    <input type="number" id="monto" placeholder="Ej: 2000" class="w-full bg-slate-800 p-5 rounded-2xl text-white outline-none focus:ring-2 focus:ring-blue-500 border border-slate-700 text-2xl font-extrabold mt-1">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700/50 text-center">
                        <label class="block text-[9px] text-slate-500 font-bold uppercase mb-1">Días</label>
                        <input type="number" id="dias" value="15" class="w-full bg-transparent text-center text-xl font-bold outline-none text-white">
                    </div>
                    <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700/50 text-center">
                        <label class="block text-[9px] text-slate-500 font-bold uppercase mb-1">% Int</label>
                        <input type="number" id="interes" value="20" class="w-full bg-transparent text-center text-xl font-bold outline-none text-white">
                    </div>
                </div>

                <button onclick="generarPlan()" class="w-full bg-blue-600 hover:bg-blue-700 py-5 rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-lg shadow-blue-900/40 active:scale-95 transition-all">
                    Calcular Cuota
                </button>

                <div id="resultado" class="hidden bg-slate-800 p-6 rounded-[2rem] border border-blue-500/40 text-center mt-5">
                    <p class="text-[10px] text-blue-400 font-bold uppercase tracking-widest mb-1">Pago Diario:</p>
                    <p id="cuotaFinal" class="text-5xl font-black text-white"></p>
                    
                    <button onclick="enviarRecibo()" class="mt-6 w-full bg-green-600 hover:bg-green-700 py-4 rounded-xl text-[10px] font-black uppercase tracking-widest flex items-center justify-center">
                        <i class="fab fa-whatsapp mr-2 text-xl"></i> Enviar por WhatsApp
                    </button>
                </div>
            </div>
            
            <div class="mt-12 text-center opacity-20">
                <p class="text-[7px] tracking-[0.5em] font-black italic">SISTEMA DE GESTIÓN PRIVADO v1.5</p>
            </div>
        </div>
    </div>

    <script>
        function generarPlan() {
            const monto = parseFloat(document.getElementById('monto').value);
            const dias = parseInt(document.getElementById('dias').value);
            const interes = parseInt(document.getElementById('interes').value);
            
            if(monto > 0) {
                const total = monto + (monto * (interes / 100));
                const cuota = total / dias;
                // Redondeamos hacia arriba para no perder centavos
                document.getElementById('cuotaFinal').innerText = '$' + Math.ceil(cuota);
                document.getElementById('resultado').classList.remove('hidden');
                // Desplazamiento suave para ver el resultado
                document.getElementById('resultado').scrollIntoView({behavior: "smooth"});
            }
        }

        function enviarRecibo() {
            const monto = document.getElementById('monto').value;
            const cuota = document.getElementById('cuotaFinal').innerText;
            const dias = document.getElementById('dias').value;
            const texto = `*JASM MICROCRÉDITOS*%0A_Confianza que impulsa_%0A---------------------------%0ADetalle de tu crédito:%0A%0A*Monto:* $${monto}%0A*Plazo:* ${dias} días%0A*PAGO DIARIO:* ${cuota}%0A---------------------------%0A_¡Gracias por tu preferencia!_`;
            window.open(`https://wa.me/?text=${texto}`, '_blank');
        }
    </script>
</body>
</html>
