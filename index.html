<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JASM - Folleto y Gestión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f1f5f9; }
        .gradient-blue { background8: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
    </style>
</head>
<body>
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl overflow-hidden">
        <header class="gradient-blue text-white p-10 text-center rounded-b-[3rem] shadow-lg">
            <h1 class="text-4xl font-black tracking-tighter">JASM</h1>
            <p class="text-[10px] uppercase tracking-[0.3em] opacity-80">Confianza que impulsa</p>
        </header>

        <div class="p-6 space-y-6 text-center">
            <div class="bg-blue-50 p-5 rounded-2xl border-l-4 border-blue-600">
                <h3 class="font-bold text-blue-900 uppercase text-sm">¡IMPULSA TU NEGOCIO HOY! 🚀</h3>
                <p class="text-[11px] text-blue-700 mt-1">Crédito rápido, seguro y sin complicaciones.</p>
            </div>
            <div class="space-y-3 text-left">
                <h2 class="text-sm font-bold text-slate-800 flex items-center italic"><i class="fas fa-clipboard-check mr-2 text-blue-600"></i> REQUISITOS MÍNIMOS</h2>
                <ul class="grid grid-cols-1 gap-2 text-[11px] text-slate-600 font-medium">
                    <li class="flex items-center p-3 bg-slate-50 rounded-xl border border-slate-100"><i class="fas fa-id-card mr-3 text-blue-500"></i> INE Vigente (Original)</li>
                    <li class="flex items-center p-3 bg-slate-50 rounded-xl border border-slate-100"><i class="fas fa-home mr-3 text-blue-500"></i> Comprobante de Domicilio</li>
                    <li class="flex items-center p-3 bg-slate-50 rounded-xl border border-slate-100"><i class="fas fa-store mr-3 text-blue-500"></i> Negocio Propio</li>
                </ul>
            </div>
        </div>

        <div class="mt-10 bg-[#0f172a] p-8 text-white rounded-t-[3rem] border-t-8 border-blue-600">
            <h2 class="text-xl font-bold mb-6 text-blue-400 flex items-center italic"><i class="fas fa-calculator mr-3 text-blue-500"></i> CALCULADORA JASM</h2>
            <div class="space-y-5">
                <input type="number" id="monto" placeholder="Monto $" class="w-full bg-slate-800 p-4 rounded-xl text-white border border-slate-700 text-xl font-bold">
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-slate-800/50 p-3 rounded-xl text-center border border-slate-700/50">
                        <label class="block text-[8px] text-slate-500 font-bold uppercase">Días</label>
                        <input type="number" id="dias" value="15" class="w-full bg-transparent text-center text-lg font-bold text-white">
                    </div>
                    <div class="bg-slate-800/50 p-3 rounded-xl text-center border border-slate-700/50">
                        <label class="block text-[8px] text-slate-500 font-bold uppercase">% Int</label>
                        <input type="number" id="interes" value="20" class="w-full bg-transparent text-center text-lg font-bold text-white">
                    </div>
                </div>
                <button onclick="generarPlan()" class="w-full bg-blue-600 py-4 rounded-xl font-black text-xs uppercase tracking-widest">Calcular Cuota</button>
                <div id="resultado" class="hidden bg-slate-800 p-5 rounded-2xl border border-blue-500/30 text-center mt-4">
                    <p class="text-[9px] text-blue-400 font-bold uppercase mb-1">Pago Diario:</p>
                    <p id="cuotaFinal" class="text-4xl font-black text-white"></p>
                    <button onclick="enviarRecibo()" class="mt-5 w-full bg-green-600 py-3 rounded-xl text-[10px] font-black uppercase"><i class="fab fa-whatsapp mr-2 text-lg"></i> Enviar WhatsApp</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        function generarPlan() {
            const m = parseFloat(document.getElementById('monto').value);
            const d = parseInt(document.getElementById('dias').value);
            const i = parseInt(document.getElementById('interes').value);
            if(m > 0) {
                const cuota = (m + (m * (i/100))) / d;
                document.getElementById('cuotaFinal').innerText = '$' + Math.ceil(cuota);
                document.getElementById('resultado').classList.remove('hidden');
            }
        }
        function enviarRecibo() {
            const m = document.getElementById('monto').value;
            con
              st c = document.getElementById('cuotaFinal').innerText;
            const d = document.getElementById('dias').value;
            const texto = `*JASM MICROCRÉDITOS*%0AMonto: $${m}%0APlazo: ${d} días%0APAGO DIARIO: ${c}`;
            window.open(`https://wa.me/?text=${texto}`, '_blank');
        }
    </script>
</body>
</html>
