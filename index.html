<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JASM - Sistema de Gestión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f1f5f9; }
        .gradient-header { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
    </style>
</head>
<body>

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl overflow-hidden">
        <header class="gradient-header text-white p-10 text-center rounded-b-[3rem] shadow-lg">
            <h1 class="text-4xl font-black tracking-tighter">JASM</h1>
            <p class="text-[10px] uppercase tracking-[0.3em] opacity-80">Microcréditos Estratégicos</p>
        </header>

        <div class="p-6 space-y-6">
            <div class="bg-blue-50 p-5 rounded-2xl border-l-4 border-blue-600 shadow-sm">
                <h3 class="font-bold text-blue-900 flex items-center"><i class="fas fa-hand-holding-dollar mr-2"></i> CRÉDITO PARA TU NEGOCIO</h3>
                <p class="text-xs text-blue-700 mt-1">Sin fricción, trato directo y diseñado para tu crecimiento.</p>
            </div>

            <section class="space-y-3">
                <h4 class="text-[10px] font-black text-slate-400 uppercase">Beneficios VIP</h4>
                <div class="grid grid-cols-2 gap-3 text-center text-[10px] font-bold uppercase">
                    <div class="p-3 bg-slate-50 border rounded-xl">🚀 Rápido</div>
                    <div class="p-3 bg-slate-50 border rounded-xl">🏦 Transferencia</div>
                    <div class="p-3 bg-slate-50 border rounded-xl">🛡️ Sin Aval</div>
                    <div class="p-3 bg-slate-50 border rounded-xl">📈 Crecimiento</div>
                </div>
            </section>
        </div>

        <div class="mt-10 bg-slate-900 p-8 text-white rounded-t-[3rem] border-t-8 border-blue-500">
            <h2 class="text-xl font-bold mb-6 text-blue-400 flex items-center italic">
                <i class="fas fa-user-gear mr-3"></i> PANEL DE TRABAJO
            </h2>
            
            <div class="space-y-5">
                <div>
                    <label class="text-[10px] text-slate-400 font-bold uppercase ml-1">Monto a Prestar ($)</label>
                    <input type="number" id="monto" placeholder="Ej: 2000" class="w-full bg-slate-800 p-4 rounded-2xl text-white outline-none focus:ring-2 focus:ring-blue-500 border border-slate-700 text-lg font-bold">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] text-slate-400 font-bold uppercase ml-1">Días (Plazo)</label>
                        <input type="number" id="dias" value="20" class="w-full bg-slate-800 p-4 rounded-2xl text-center border border-slate-700 font-bold">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-400 font-bold uppercase ml-1">% Interés</label>
                        <input type="number" id="interes" value="20" class="w-full bg-slate-800 p-4 rounded-2xl text-center border border-slate-700 font-bold">
                    </div>
                </div>

                <button onclick="generarPlan()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-blue-900/40 transition-all active:scale-95">
                    Calcular Cuota Diaria
                </button>

                <div id="resultado" class="hidden bg-slate-800/80 p-6 rounded-3xl border border-blue-500/50 text-center">
                    <p class="text-[10px] text-blue-300 font-bold uppercase">Pago Diario Requerido:</p>
                    <p id="cuotaFinal" class="text-5xl font-black text-white my-2"></p>
                    <p id="totalPagar" class="text-[10px] text-slate-500 font-bold"></p>
                    
                    <button onclick="enviarRecibo()" class="mt-6 w-full bg-green-600 hover:bg-green-700 py-3 rounded-xl text-[10px] font-black uppercase flex items-center justify-center">
                        <i class="fab fa-whatsapp mr-2 text-lg"></i> Enviar Plan de Pago
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function generarPlan() {
            const monto = parseFloat(document.getElementById('monto').value);
            const dias = parseInt(document.getElementById('dias').value);
            const interes = parseInt(document.getElementById('interes').value);
            
            if(monto > 0) {
                const total = monto + (monto * (interes / 100));
                const cuota = total / dias;
                
                document.getElementById('cuotaFinal').innerText = '$' + Math.ceil(cuota);
                document.getElementById('totalPagar').innerText = 'TOTAL A DEVOLVER: $' + total;
                document.getElementById('resultado').classList.remove('hidden');
            }
        }

        function enviarRecibo() {
            const monto = document.getElementById('monto').value;
            const cuota = document.getElementById('cuotaFinal').innerText;
            const dias = document.getElementById('dias').value;
            
            const texto = `*JASM MICROCRÉDITOS*%0A_Sistema de Gestión de Pagos_%0A---------------------------%0AHola, se ha generado tu plan de pago:%0A%0A*Monto Prestado:* $${monto}%0A*Plazo:* ${dias} días%0A*CUOTA DIARIA:* ${cuota}%0A---------------------------%0APagos vía transferencia de 2:00 PM a 6:00 PM.%0A_Gracias por tu confianza._`;
            
            window.open(`https://wa.me/?text=${texto}`, '_blank');
        }
    </script>
</body>
</html>
